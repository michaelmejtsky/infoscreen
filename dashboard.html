<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard Zugang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      height:100vh;
      background:#111;
      color:white;
      font-family:Arial, sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .box {
      background:#1c1c1c;
      padding:30px;
      border-radius:14px;
      text-align:center;
      border:1px solid #333;
      box-shadow:0 0 20px rgba(0,0,0,0.6);
    }

    input {
      padding:12px;
      font-size:22px;
      width:120px;
      text-align:center;
      background:#222;
      color:white;
      border:1px solid #555;
      border-radius:8px;
    }

    button {
      margin-top:15px;
      padding:10px 24px;
      font-size:16px;
      background:#0066cc;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Dashboard Zugang</h2>
  <p>Bitte Code eingeben</p>

  <input id="code" type="password" maxlength="4" placeholder="****">
  <br>
  <button onclick="checkCode()">Öffnen</button>
</div>

<script>
const DASHBOARD_URL = "https://script.google.com/macros/s/AKfycbzIK2vHhPuGnLTiaD9kkSpIMVZ9qPIhe4T23aZiQQjQrSqFWxDbViinHfSbHWSK_dea/exec";

function checkCode() {
  const code = document.getElementById("code").value;

  if (code === "3100") {
    window.location.href = DASHBOARD_URL;
  } else {
    alert("Falscher Code!");
  }
}

document.getElementById("code").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkCode();
});
</script>

</body>
</html>
