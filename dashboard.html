<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard Login</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#111;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }

    .box {
      background:#1c1c1c;
      padding:30px;
      border-radius:10px;
      text-align:center;
    }

    input {
      padding:10px;
      font-size:18px;
      width:120px;
      text-align:center;
      margin-top:10px;
    }

    button {
      margin-top:15px;
      padding:10px 20px;
      font-size:16px;
      background:#0066cc;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Zugang Dashboard</h2>
  <p>Bitte Code eingeben</p>

  <input id="code" type="password" maxlength="4" placeholder="****">
  <br>
  <button onclick="check()">OK</button>
</div>

<script>
function check() {
  const code = document.getElementById("code").value;

  if (code === "3100") {
    // 👉 HIER passiert die Weiterleitung zum Dashboard
    window.location.href = "./";
  } else {
    alert("Falscher Code!");
  }
}
</script>

</body>
</html>
